name: CI/CD Pipeline

on:
  push:
    paths:
      - 'apps/demo-app/src/**'

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          cd apps/demo-app/src
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:latest

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/demo-app:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:latest

      - name: Update Kubernetes deployment
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:${{ github.sha }}|" apps/demo-app/deployment.yaml
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add apps/demo-app/deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push
