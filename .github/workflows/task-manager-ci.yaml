name: Task Manager CI/CD

on:
  push:
    paths:
      - 'apps/task-manager/backend/**'
      - 'apps/task-manager/frontend/**'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend
        run: |
          cd apps/task-manager/backend
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/task-backend:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/task-backend:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/task-backend:latest

      - name: Scan backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/task-backend:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Push backend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/task-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/task-backend:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend
        run: |
          cd apps/task-manager/frontend
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/task-frontend:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/task-frontend:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/task-frontend:latest

      - name: Scan frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/task-frontend:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Push frontend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/task-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/task-frontend:latest
