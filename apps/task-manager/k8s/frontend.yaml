apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-frontend
  template:
    metadata:
      labels:
        app: task-frontend
    spec:
      containers:
      - name: task-frontend
        image: sebica20033/task-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: task-frontend
  namespace: default
spec:
  selector:
    app: task-frontend
  ports:
  - port: 80
    targetPort: 80
